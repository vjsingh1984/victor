version: 1

# Victor-owned model and orchestration policy for providers whose canonical identity,
# endpoints, aliases, and wire capabilities live in Sandhi's typed provider catalog.
providers:
  together:
    default_model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    timeout: 120
    max_retries: 3
    cache:
      supported: true
      kv_prefix_caching: true
    default_context_window: 32768
    # Ordered compatibility routes. Model metadata below describes advertised
    # limits; these values preserve Victor's established budgeting behavior.
    context_window_routes:
      - {model_prefix: meta-llama/Llama-3.3-70B, tokens: 128000}
      - {model_prefix: meta-llama/Llama-3.1-405B, tokens: 128000}
      - {model_prefix: meta-llama/Llama-3.1-70B, tokens: 128000}
      - {model_prefix: meta-llama/Llama-3.1-8B, tokens: 128000}
      - {model_prefix: Qwen/Qwen2.5-Coder, tokens: 32768}
      - {model_prefix: Qwen/Qwen2.5, tokens: 32768}
      - {model_prefix: deepseek-ai/DeepSeek, tokens: 64000}
      - {model_prefix: mistralai/Mixtral-8x22B, tokens: 65536}
      - {model_prefix: mistralai/Mixtral-8x7B, tokens: 32768}
    models:
      meta-llama/Llama-3.3-70B-Instruct-Turbo:
        description: Llama 3.3 70B Turbo - Fast, high quality
        context_window: 131072
        max_output: 8192
        supports_tools: true
      openai/gpt-oss-120b:
        description: GPT-OSS 120B - OpenAI open-weight model
        context_window: 128000
        max_output: 16384
        supports_tools: true
      deepseek-ai/DeepSeek-V3.1:
        description: DeepSeek V3.1 - 671B MoE model
        context_window: 128000
        max_output: 16384
        supports_tools: true
      deepseek-ai/DeepSeek-R1:
        description: DeepSeek R1 - Reasoning model
        context_window: 163839
        max_output: 16384
        supports_tools: true
      moonshotai/Kimi-K2-Instruct-0905:
        description: Kimi K2 - 256K context, strong reasoning
        context_window: 262144
        max_output: 16384
        supports_tools: true
      meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8:
        description: Llama 4 Maverick - 1M context MoE
        context_window: 1048576
        max_output: 8192
        supports_tools: true
