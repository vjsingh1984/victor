# Release workflow for victor-codegraph — independent of victor-ai / victor-contracts.
#
# Triggers:
#   - Push tag: victor-codegraph-v*  (e.g. victor-codegraph-v0.1.0)
#   - Manual dispatch (optionally TestPyPI only)
#
# Publishing uses PyPI Trusted Publishing (OIDC) — NO API token secret required.
# To configure on the PyPI side (one-time):
#   1. Create the project owner / pending publisher at https://pypi.org/manage/account/publishing/
#   2. Add a "GitHub" trusted publisher:
#        owner   = vjsingh1984
#        repo    = victor
#        workflow= release-codegraph.yml
#        environment = pypi   (and `testpypi` for the TestPyPI publisher)
#   3. (No secrets to add — OIDC handles auth via `permissions: id-token: write`.)

name: Release codegraph

on:
  push:
    tags:
      - 'victor-codegraph-v*'
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: 'Publish to TestPyPI only'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Editable install
        run: |
          python -m pip install --upgrade pip
          pip install -e ./victor-contracts
          pip install -e "./victor-codegraph[dev]"
      - name: Test
        working-directory: victor-codegraph
        run: pytest tests -v --tb=short

  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist + wheel
        working-directory: victor-codegraph
        run: python -m build
      - name: Check metadata
        run: twine check victor-codegraph/dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codegraph-dist
          path: victor-codegraph/dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event.inputs.publish_testpypi == 'true' || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/victor-codegraph/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: codegraph-dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/victor-codegraph-v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/victor-codegraph/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: codegraph-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          skip-existing: true
