name: Packages CI

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/packages.yml'
      - 'victor/**'
      - 'victor-contracts/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'MANIFEST.in'
      - 'VERSION'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/packages.yml'
      - 'victor/**'
      - 'victor-contracts/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'MANIFEST.in'
      - 'VERSION'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Verify versions are in sync before anything else
  version-check:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check version consistency
        run: python scripts/check_version_sync.py

  # Build and test victor-contracts first (victor-ai depends on it)
  build-sdk:
    name: Build victor-contracts
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build wheel

      - name: Build victor-contracts
        working-directory: victor-contracts
        run: python -m build

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: victor-contracts-dist
          path: victor-contracts/dist/

  # Test package in isolation
  test-packages:
    name: Test victor-ai (Python ${{ matrix.python-version }})
    needs: [version-check, build-sdk]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Download and install victor-contracts wheel
        uses: actions/download-artifact@v4
        with:
          name: victor-contracts-dist
          path: sdk-dist/

      - name: Install victor-contracts from local wheel
        run: |
          pip install sdk-dist/*.whl
          python -c "from victor_contracts import __version__; print(f'victor-contracts {__version__} installed from local wheel')"

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch for faster CI
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run package tests
        run: |
          pytest tests -v --cov --cov-report=xml
        continue-on-error: true  # Allow initial failures during migration

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          flags: victor-ai
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Build package
  build-packages:
    name: Build victor-ai
    runs-on: ubuntu-latest
    needs: test-packages
    if: always() && (needs.test-packages.result == 'success' || needs.test-packages.result == 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build wheel hatchling

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: victor-ai-dist
          path: dist/

  # Integration test with package installed
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-sdk, build-packages]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: victor-ai-dist
          path: dist/

      - name: Download victor-contracts artifact
        uses: actions/download-artifact@v4
        with:
          name: victor-contracts-dist
          path: sdk-dist/

      - name: Install victor-contracts from built wheel
        run: pip install sdk-dist/*.whl

      - name: Install package from built wheel
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install dist/*.whl

      - name: Verify imports work
        run: |
          python -c "import victor; print(f'victor version: {victor.__version__}')"
          python -c "from victor.core.verticals.vertical_loader import discover_vertical_plugins, discover_tool_plugins; print('Plugin discovery works')"

      - name: CLI smoke test
        run: victor --help
        continue-on-error: true  # May fail during migration

  # Publish to TestPyPI on develop branch (preview builds)
  # Production PyPI publishing is handled by release.yml (v* tags)
  # SDK publishing is handled by release-sdk.yml (sdk-v* tags)
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build-sdk, build-packages, integration-test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download victor-ai artifact
        uses: actions/download-artifact@v4
        with:
          name: victor-ai-dist
          path: dist/

      - name: Publish victor-ai to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
        continue-on-error: true
