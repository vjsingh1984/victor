name: Performance Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  checks: write
  pull-requests: write  # Allow commenting on PRs with benchmark results

jobs:
  performance-regression:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ['3.10']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comparison

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y victor victor-ai victor-sdk || true
          pip install --no-cache-dir -e ./victor-sdk
          pip install -e ".[dev,benchmark,checkpoints]"
          pip install --no-cache-dir --no-deps -e ./victor-sdk
          pip install pytest-benchmark

      - name: Run performance tests
        run: |
          pytest tests/performance/ \
            --benchmark-only \
            --benchmark-json=output.json \
            --benchmark-autosave \
            --benchmark-sort=mean \
            -v

      - name: Store benchmark result (skipped - gh-pages restricted)
        run: |
          echo "Benchmark results will be stored as workflow artifacts instead of gh-pages"
          echo "This works around repository branch creation restrictions"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.python-version }}
          path: |
            output.json
            .benchmarks/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('output.json', 'utf8'));

            let comment = '## 📊 Performance Test Results\n\n';

            // Summarize key benchmarks
            const benchmarks = [
              'test_register_100_items',
              'test_register_1000_items',
              'test_batch_register_100_items',
              'test_batch_register_1000_items',
            ];

            comment += '| Test | Mean (ms) | Min (ms) | Max (ms) |\n';
            comment += '|------|-----------|----------|----------|\n';

            for (const bench of benchmarks) {
              if (data.benchmarks[bench]) {
                const stats = data.benchmarks[bench].stats;
                comment += `| ${bench} | ${stats.mean.toFixed(3)} | ${stats.min.toFixed(3)} | ${stats.max.toFixed(3)} |\n`;
              }
            }

            comment += '\n🔗 Full results available in the workflow artifacts.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  baseline-comparison:
    name: Compare to Baseline
    runs-on: ubuntu-latest
    needs: performance-regression
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}  # Checkout base branch for baseline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y victor victor-ai victor-sdk || true
          pip install --no-cache-dir -e ./victor-sdk
          pip install -e ".[dev,benchmark,checkpoints]"
          pip install --no-cache-dir --no-deps -e ./victor-sdk

      - name: Run baseline tests
        run: |
          pytest tests/performance/ \
            --benchmark-only \
            --benchmark-json=baseline.json \
            --benchmark-sort=mean \
            -v

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: baseline-results
          path: baseline.json

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-3.10
          path: .

      - name: Compare results
        run: |
          pip install pytest-benchmark
          pytest-benchmark compare baseline.json output.json \
            --sort=mean \
            --columns=mean,stddev,ops

      - name: Check for regressions
        run: |
          python -c "
          import json
          import sys

          with open('baseline.json') as f:
              baseline = json.load(f)
          with open('output.json') as f:
              current = json.load(f)

          regressions = []
          for test in baseline['benchmarks']:
              if test in current['benchmarks']:
                  baseline_mean = baseline['benchmarks'][test]['stats']['mean']
                  current_mean = current['benchmarks'][test]['stats']['mean']
                  change_pct = ((current_mean - baseline_mean) / baseline_mean) * 100

                  if change_pct > 20:  # 20% regression threshold
                      regressions.append((test, change_pct))

          if regressions:
              print('❌ PERFORMANCE REGRESSIONS DETECTED:')
              for test, change_pct in regressions:
                  print(f'  {test}: +{change_pct:.1f}%')
              sys.exit(1)
          else:
              print('✅ No significant regressions detected')
          "

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [performance-regression, baseline-comparison]
    if: failure()

    steps:
      - name: Send notification
        run: |
          echo "Performance tests failed. Check workflow logs for details."
          # Add actual notification logic here (e.g., Slack, email)
