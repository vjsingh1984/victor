name: Publish victor-sdk to PyPI (No Tests)

on:
  workflow_dispatch:
  inputs:
    version:
      description: 'Version to publish (e.g., 0.5.7)'
      required: true
      type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-sdk:
    name: Build and Publish victor-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version
        run: |
          VERSION="${{ inputs.version }}"
          echo "Publishing victor-sdk version $VERSION"

          # Check version in pyproject.toml
          SDK_VERSION=$(grep "^version = " victor-sdk/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "SDK version in pyproject.toml: $SDK_VERSION"

          if [[ "$SDK_VERSION" != "$VERSION" ]]; then
            echo "ERROR: Version mismatch! Expected $VERSION but found $SDK_VERSION"
            echo "Please update victor-sdk/pyproject.toml first"
            exit 1
          fi

          echo "✓ Version verified: $VERSION"

      - name: Build victor-sdk
        working-directory: victor-sdk
        run: |
          python -m build

      - name: Check package
        run: |
          twine check victor-sdk/dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: victor-sdk/dist/
          skip-existing: true
          verbose: true

      - name: Verify publication
        run: |
          sleep 10  # Wait for PyPI to update
          VERSION="${{ inputs.version }}"
          pip install victor-sdk==$VERSION
          python -c "from victor_sdk import __version__; print(f'✓ Successfully published and installed victor-sdk {__version__}')"
