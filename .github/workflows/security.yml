# Security Scanning - Runs in parallel with other CI jobs
# Combines multiple security tools for comprehensive coverage

name: Security Scanning

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/security.yml'
      - 'victor/**'
      - 'victor-contracts/**'
      - 'rust/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/security.yml'
      - 'victor/**'
      - 'victor-contracts/**'
      - 'rust/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose*.yml'
  schedule:
    # Run weekly on Monday at 2 AM UTC (backstop for newly-disclosed advisories;
    # per-PR Trivy gates CRITICAL deps and develop->main runs the full scan)
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: git /github/workspace --redact --verbose --no-banner

  trivy-critical:
    name: Critical Filesystem Scan (Trivy, Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Trivy critical scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          cache: false

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-critical-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          cache: false

      - name: Upload Trivy critical results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-critical-results.sarif

  dependency-audit:
    name: Dependency Audit (High+Critical Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install package for audit
        run: |
          pip install -e ./victor-contracts
          pip install -e .

      - name: Run pip-audit (blocking on high+ severity)
        run: |
          pip install pip-audit
          # Run pip-audit with JSON output for parsing
          pip-audit --format json --output audit-report.json 2>&1 | tee /tmp/pip-audit-output.txt

          # Parse and filter vulnerabilities
          python3 - <<'PY'
          import json
          import subprocess
          import sys

          try:
              with open("audit-report.json", "r", encoding="utf-8") as f:
                  report = json.load(f)
          except FileNotFoundError:
              print("No audit report found, checking exit status...")
              result = subprocess.run(["pip-audit"], capture_output=True, text=True, check=False)
              if result.returncode != 0:
                  print("pip-audit failed (no JSON output available)")
                  print(result.stdout)
                  print(result.stderr)
              sys.exit(result.returncode)

          known_cves = set()
          try:
              with open(".pip-audit-known-vulnerabilities", "r", encoding="utf-8") as f:
                  for raw_line in f:
                      line = raw_line.strip()
                      if line and not line.startswith("#"):
                          cve_id = line.split("|", 1)[0].strip()
                          if cve_id.startswith("CVE-"):
                              known_cves.add(cve_id)
          except FileNotFoundError:
              print("No .pip-audit-known-vulnerabilities file found")

          vulnerabilities = report.get("vulnerabilities", [])
          filtered = [v for v in vulnerabilities if v.get("id") not in known_cves]

          if filtered:
              print(
                  f"Found {len(filtered)} vulnerabilities not in exceptions:",
                  file=sys.stderr,
              )
              for vuln in filtered:
                  fix_versions = vuln.get("fix_versions", [])
                  if fix_versions:
                      first_fix = fix_versions[0]
                      if isinstance(first_fix, dict):
                          fix_info = first_fix.get("version", "no fix")
                      else:
                          fix_info = first_fix
                  else:
                      fix_info = "no fix available"
                  print(f"  {vuln.get('id')} - {vuln.get('package')} ({fix_info})")
              sys.exit(1)

          if known_cves:
              print("All vulnerabilities documented in .pip-audit-known-vulnerabilities")
              print(f"Known CVEs: {', '.join(sorted(known_cves))}")
          else:
              print("No vulnerabilities found")
          PY
        # Blocks on any known vulnerability. Exceptions must be documented in
        # .pip-audit-known-vulnerabilities if a transitive dependency cannot be
        # updated immediately. See SECURITY.md § Dependency Audit Exceptions.

  code-security:
    name: Code Security (Bandit, High-Severity Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (high+critical severity blocking)
        run: |
          bandit -r victor/ \
            -f json \
            -o bandit-report.json \
            --severity-level high \
            --confidence-level high \
            -s B101,B324 \
            --ini .bandit
        # Blocks on HIGH severity + HIGH confidence findings.
        # Lower severity findings are still reported in the artifact.
        # To add exceptions, use # nosec inline or .bandit config.

      - name: Run Bandit full report (advisory)
        if: always()
        run: |
          bandit -r victor/ \
            -f json \
            -o bandit-report-full.json \
            -s B101,B324 \
            --ini .bandit \
            || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: |
            bandit-report.json
            bandit-report-full.json
          retention-days: 30

  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config auto \
            --sarif --output semgrep.sarif \
            --exclude 'archive/*' \
            --exclude 'docs/*' \
            --exclude 'tests/*' \
            --exclude 'examples/*' \
            --exclude 'vscode-victor/*' \
            || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Drop nosemgrep-suppressed findings from SARIF
        # Semgrep emits in-source-suppressed findings (`# nosemgrep: <rule-id>`
        # with a written justification — repo precedent: outcome_training.py,
        # graph_tool.py) into the SARIF with `suppressions: [{kind: inSource}]`,
        # but GitHub code scanning does not honor the SARIF suppressions
        # property and opens alerts for them anyway. Strip suppressed results
        # before upload so the code-scanning gate matches semgrep's own
        # verdict. Rule coverage is unchanged — only findings an engineer
        # explicitly suppressed inline (per-rule-id, with justification) are
        # excluded.
        if: hashFiles('semgrep.sarif') != ''
        run: |
          python3 - <<'EOF'
          import json

          with open("semgrep.sarif") as fh:
              sarif = json.load(fh)
          dropped = 0
          for run in sarif.get("runs", []):
              results = run.get("results", [])
              kept = [r for r in results if not r.get("suppressions")]
              dropped += len(results) - len(kept)
              run["results"] = kept
          with open("semgrep.sarif", "w") as fh:
              json.dump(sarif, fh)
          print(f"Dropped {dropped} in-source-suppressed finding(s) from SARIF")
          EOF

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  license-scan:
    name: License Compliance (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-licenses
        run: pip install pip-licenses

      - name: Generate license report
        run: |
          pip-licenses \
            --format=json \
            --output-file=license-report.json \
            --with-system \
            || true
        # Advisory because license compatibility still requires human review and policy decisions.
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: license-report.json
          retention-days: 30
