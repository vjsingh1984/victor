# Fast CI Checks - Run quick validation first (fail-fast strategy)
# This workflow runs in ~1-2 minutes and catches common issues early
# All checks run in parallel for maximum speed

name: CI - Fast Checks

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci-fast.yml'
      - 'victor/**'
      - 'victor-contracts/**'
      - 'rust/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'Makefile'
      - 'MANIFEST.in'
      - 'VERSION'
  # NOTE: pull_request has NO paths filter. ci-fast produces the required
  # `CI Success` merge gate (set on develop); a path-filtered trigger would skip
  # docs/config-only PRs, leaving the required check unreported and the PR
  # BLOCKED (unmergeable). The gates run on every PR so the aggregate reports.
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All these jobs run in parallel for maximum speed
  format:
    name: Format Check (Black)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Black
        run: pip install black==26.3.1

      - name: Check formatting
        run: black --check victor tests

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check victor

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install repo hygiene dependencies
        run: pip install pyyaml

      - name: Check repo hygiene
        run: python scripts/ci/repo_hygiene_check.py

  docs-drift:
    name: Docs Drift (version/counts vs code)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs match code (version, provider/tool/vertical counts)
        # Pure stdlib; no install. Fails if a doc contradicts VERSION, the provider count, or the
        # declared tool-module / vertical canon — keeping the hand-written docs self-enforcing.
        run: python scripts/ci/check_docs_drift.py

  typecheck:
    name: Type Check (MyPy, Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MyPy
        run: pip install mypy types-pyyaml types-aiofiles

      - name: Type check with MyPy
        run: mypy victor

  strict-typecheck:
    name: Global Strict Type Gate (MyPy)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MyPy
        run: pip install mypy types-pyyaml types-aiofiles

      - name: Enforce global strict type checking
        run: |
          # M3 achievement (2026-03-10): Global strict mode enabled
          # M1 baseline: 6 modules
          # M1 expansion: +5 modules (total 11)
          # M2 expansion: +4 modules (total 15)
          # M3: Global strict enabled for entire codebase
          mypy victor --strict

  imports:
    name: Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install victor-contracts from local repository first (includes constants module)
          pip install -e ./victor-contracts
          # Then install victor-ai with embeddings (needed for import chain)
          pip install -e ".[embeddings]"

      - name: Check imports
        run: |
          python -c "import victor; print('✓ victor imports successfully')"
          python -c "from victor.framework import Agent; print('✓ Agent imports')"
          python -c "from victor.framework.graph import StateGraph; print('✓ StateGraph imports')"

  imports-with-verticals:
    name: Import Check with Verticals
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies with verticals
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install victor-contracts from local repository first (includes constants module)
          pip install -e ./victor-contracts
          # Then install victor-ai (which depends on victor-contracts)
          pip install -e .
          # Foundational shared code->CPG parser; the verticals delegate symbol extraction
          # to it (ADR-014), so install it before them to exercise the real path.
          pip install -e ./victor-codegraph

      - name: Install external vertical packages
        run: |
          # All verticals now live in this monorepo (verticals/<name>); their standalone
          # repos are archived. Install the local copies so CI exercises the tracked
          # source, not the stale archived repos. Folds verified complete (superset of
          # each archived repo; all import cleanly).
          pip install -e ./verticals/victor-coding
          pip install -e ./verticals/victor-devops
          pip install -e ./verticals/victor-rag
          pip install -e ./verticals/victor-dataanalysis
          pip install -e ./verticals/victor-research

      - name: Check vertical imports
        continue-on-error: true  # External verticals may lag behind coordinator deprecations
        run: |
          python -c "from victor_coding import CodingAssistant; print('✓ victor-coding imports')"
          python -c "from victor_rag import RAGAssistant; print('✓ victor-rag imports')"
          python -c "from victor_research import ResearchAssistant; print('✓ victor-research imports')"
          python -c "from victor_devops import DevOpsAssistant; print('✓ victor-devops imports')"
          python -c "from victor_dataanalysis import DataAnalysisAssistant; print('✓ victor-dataanalysis imports')"

      - name: Check vertical entry point loading
        continue-on-error: true  # External verticals need migration to victor.plugins
        run: |
          python - <<'PY'
          from victor.core.verticals import load_vertical

          verticals_to_test = ["coding", "rag", "research", "devops", "dataanalysis"]
          for vertical_name in verticals_to_test:
              try:
                  vertical = load_vertical(vertical_name)
                  print(f"✓ {vertical_name} loads via entry point: {vertical.__name__}")
              except Exception as e:
                  print(f"⚠ {vertical_name}: {e} (needs migration to victor.plugins)")
          PY

      - name: Check protocol-based team spec loading
        run: |
          python - <<'PY'
          from victor.framework.providers.protocol import get_provider_registry
          from victor.framework.team_registry import load_all_verticals, get_team_registry

          # Test provider registry
          registry = get_provider_registry()
          all_specs = registry.get_all_team_specs()

          print("Protocol-based team spec discovery:")
          for vertical, specs in all_specs.items():
              print(f"  {vertical}: {len(specs)} teams")

          # Test loading into team registry
          count = load_all_verticals()
          print(f"Total teams registered: {count}")

          # Test cross-vertical team lookup
          team_reg = get_team_registry()
          feature_team = team_reg.find_team_for_task('feature')
          deploy_team = team_reg.find_team_for_task('deploy')

          assert feature_team is not None, "Feature team should be found"
          assert deploy_team is not None, "Deploy team should be found"

          print("✓ Protocol system working correctly")
          PY

      # - name: Startup KPI Guardrails
      #   TODO: Re-enable once external verticals are on PyPI
      #   The benchmark script requires activation-vertical which needs external packages
      #   env:
      #     GENERIC_RESULT_CACHE_ENABLED: "1"
      #     HTTP_CONNECTION_POOL_ENABLED: "1"
      #     FRAMEWORK_PRELOAD_ENABLED: "1"
      #   run: |
      #     python scripts/benchmark_startup_kpi.py \
      #       --iterations 3 \
      #       --provider ollama \
      #       --model qwen3-coder:30b \
      #       --max-import-cold-ms 5000 \
      #       --max-import-warm-mean-ms 25 \
      #       --max-agent-create-cold-ms 6000 \
      #       --max-agent-create-warm-mean-ms 1500

  strict-fallback-guards:
    name: Strict Fallback Guards
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install victor-contracts from local repository first (includes constants module)
          pip install -e ./victor-contracts
          # Then install victor-ai (which depends on victor-contracts)
          pip install -e ".[dev]"

      - name: Enforce strict fallback guards on focused suites
        run: |
          VICTOR_STRICT_FRAMEWORK_PROTOCOL_FALLBACKS=1 pytest \
            tests/unit/agent/test_capability_mixin.py::TestVerticalIntegrationHelpers::test_check_capability_fallback_blocked_in_protocol_strict_mode \
            tests/unit/agent/test_capability_mixin.py::TestVerticalIntegrationHelpers::test_invoke_capability_fallback_blocked_in_protocol_strict_mode \
            -q
          VICTOR_STRICT_FRAMEWORK_PRIVATE_FALLBACKS=1 pytest \
            tests/unit/framework/test_capability_config_helpers.py::TestCapabilityConfigHelpers::test_load_private_fallback_blocked_in_strict_mode \
            tests/unit/framework/test_capability_config_helpers.py::TestCapabilityConfigHelpers::test_store_private_fallback_blocked_in_strict_mode \
            tests/unit/framework/test_capability_loader.py::TestLoaderOrchestratorIntegration::test_apply_to_blocks_private_registration_fallback_in_strict_mode \
            -q

  definition-import-boundaries:
    name: Definition Import Boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ./victor-contracts
          pip install -e ".[dev]"

      - name: Run definition import boundary guards
        run: make test-definition-boundaries

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check victor-ai / victor-contracts version consistency
        run: python scripts/check_version_sync.py

  guards:
    name: CI Guards
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check archive/victor-legacy guard
        if: github.event_name == 'pull_request'
        env:
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          ADDED_OR_MODIFIED=$(git diff --name-only --diff-filter=AM "origin/${BASE_BRANCH}...HEAD" | grep '^archive/victor-legacy/' || true)
          if [ -n "$ADDED_OR_MODIFIED" ]; then
            echo "❌ Additions/modifications under archive/victor-legacy/ are not allowed."
            echo "Found: $ADDED_OR_MODIFIED"
            exit 1
          fi
          echo "✓ Archive guard passed"

      - name: Check fallback_max_tools bound
        run: |
          val=$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path("victor/config/groups/tool_selection_config.py").read_text()
          m = re.search(r"fallback_max_tools:\s*int\s*=\s*(\d+)", text)
          print(m.group(1) if m else "")
          PY
          )
          if [ -z "$val" ]; then
            echo "❌ fallback_max_tools not found"
            exit 1
          fi
          if [ "$val" -le 0 ] || [ "$val" -gt 20 ]; then
            echo "❌ fallback_max_tools must be between 1 and 20 (found $val)"
            exit 1
          fi
          echo "✓ fallback_max_tools = $val (valid)"

  security-quick:
    name: Security Critical Scan (Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Trivy FS scan for critical findings
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          cache: false

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          cache: false

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  quick-tests:
    name: Quick Unit Tests (changed files)
    runs-on: ubuntu-latest
    # Runs ONLY the unit tests relevant to the PR's changed files (mirror mapping), so the
    # develop gate stays proportional to the change. The full non-slow suite is ~7h
    # single-process / ~hours even sharded, so it can't be a per-PR gate — it runs sharded at
    # develop -> main instead (see workflows/README.md CI Gating Strategy).
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff against the base branch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # victor-contracts first (provides constants), then victor-ai with dev extras
          pip install -e ./victor-contracts
          pip install -e ".[dev]"

      - name: Run unit tests for changed files
        # Map changed files -> mirror unit tests (scripts/ci/select_changed_tests.py). No mapped
        # tests (docs/CI-only changes, or source with no mirror test) => nothing to run = pass.
        # base_ref is passed via env (not inline ${{…}} in run:) to avoid shell injection from
        # untrusted context interpolation (Semgrep run-shell-injection).
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            git fetch origin "$BASE_REF" --quiet
            CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "Changed files:"; echo "$CHANGED" | sed 's/^/  /'
          mapfile -t TARGETS < <(python scripts/ci/select_changed_tests.py $CHANGED)
          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No mapped unit tests for the changed files — nothing to run (full suite runs at develop->main)."
            exit 0
          fi
          echo "Running ${#TARGETS[@]} changed-file test target(s):"; printf '  %s\n' "${TARGETS[@]}"
          # pytest exits 5 when every collected test was skipped/deselected (e.g. all
          # mapped tests skip on missing optional deps in CI) — that's a pass, not a fail.
          set +e
          pytest "${TARGETS[@]}" -m "not slow" --tb=short -q
          rc=$?
          set -e
          if [ "$rc" -eq 5 ]; then
            echo "All mapped tests were skipped or deselected (pytest exit 5) — treating as pass."
            exit 0
          fi
          exit "$rc"

  collect-check:
    name: Full-Suite Collection Check
    runs-on: ubuntu-latest
    # Collects (imports) every test module without running any test. Catches the
    # stale-import class of failure — a refactor that moves/renames a symbol and
    # misses an importer — which otherwise surfaces only at develop -> main, where
    # a single collection error turns ALL 24 shards red (see PR #376). Required
    # via the ci-success aggregate below.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # victor-contracts first (provides constants), then victor-ai with dev extras
          pip install -e ./victor-contracts
          pip install -e ".[dev]"

      - name: Collect full test suite (no execution)
        run: pytest tests/ --collect-only -q

  # Aggregate merge gate — mirrors ProximaDB's `CI Success` pattern (see
  # ../proximaDB/.github/workflows/ci.yml `ci-success`). A single required
  # status check that is green iff every core gate passed (or was path-skipped).
  # Set as the SOLE required check on develop with strict=false so auto-merge
  # fires cleanly instead of sitting BLOCKED (strict=true + zero required
  # contexts left PRs unmergeable even when all of CI was green).
  #
  # `if: always()` makes this run even when a `needs` job failed, so we fail
  # explicitly (red X) rather than reporting "skipped" (which also blocks, but
  # less clearly). `skipped` needs pass; only `failure`/`cancelled` fail.
  # Lesson from ProximaDB: an aggregate must hard-fail on any failed/cancelled
  # need — an earlier grep-based version let red CI merge (PRs #226/#264).
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - repo-hygiene
      - docs-drift
      - typecheck
      - strict-typecheck
      - imports
      - imports-with-verticals
      - strict-fallback-guards
      - definition-import-boundaries
      - version-sync
      - guards
      - security-quick
      - quick-tests
      - collect-check
    if: always()
    steps:
      - name: Require all required jobs green
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required CI jobs failed or were cancelled — blocking merge. CI Success requires every required job green (or skipped by path filter)."
          exit 1
      - name: CI Success
        run: |
          echo "✅ All required CI jobs passed (or skipped by path filter)."
          echo "## ✅ CI Success" >> "$GITHUB_STEP_SUMMARY"
