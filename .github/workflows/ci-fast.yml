# Fast CI Checks - Run quick validation first (fail-fast strategy)
# This workflow runs in ~1-2 minutes and catches common issues early
# All checks run in parallel for maximum speed

name: CI - Fast Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All these jobs run in parallel for maximum speed
  format:
    name: Format Check (Black)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Black
        run: pip install black==26.1.0

      - name: Check formatting
        run: black --check victor tests

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check victor

  typecheck:
    name: Type Check (MyPy, Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MyPy
        run: pip install mypy types-pyyaml types-aiofiles

      - name: Type check with MyPy
        run: mypy victor
        continue-on-error: true

  strict-typecheck:
    name: Strict Type Gate (MyPy)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MyPy
        run: pip install mypy types-pyyaml types-aiofiles

      - name: Enforce strict-package MyPy gate
        run: |
          # M1 baseline: 6 modules
          # M1 expansion (2026-03-10): +5 modules (total 11)
          # M2 expansion (2026-03-10): +4 modules (total 15)
          mypy --strict \
            victor/config \
            victor/storage/cache \
            victor/telemetry \
            victor/analytics \
            victor/profiler \
            victor/debug \
            victor/agent/services \
            victor/core/container \
            victor/core/protocols \
            victor/providers/base \
            victor/framework \
            victor/state \
            victor/workflows \
            victor/teams \
            victor/integrations/api

  imports:
    name: Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Check imports
        run: |
          python -c "import victor; print('✓ victor imports successfully')"
          python -c "from victor.framework import Agent; print('✓ Agent imports')"
          python -c "from victor.framework.graph import StateGraph; print('✓ StateGraph imports')"

  imports-with-verticals:
    name: Import Check with Verticals
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies with verticals
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Install external vertical packages
        run: |
          # Install vertical packages from GitHub (using protocol-based entry points)
          pip install git+https://github.com/vjsingh1984/victor-coding.git@main
          pip install git+https://github.com/vjsingh1984/victor-devops.git@main
          pip install git+https://github.com/vjsingh1984/victor-rag.git@main
          pip install git+https://github.com/vjsingh1984/victor-dataanalysis.git@main
          pip install git+https://github.com/vjsingh1984/victor-research.git@main

      - name: Check vertical imports
        run: |
          python -c "from victor_coding import CodingAssistant; print('✓ victor-coding imports')"
          python -c "from victor_rag import RAGAssistant; print('✓ victor-rag imports')"
          python -c "from victor_research import ResearchAssistant; print('✓ victor-research imports')"
          python -c "from victor_devops import DevOpsAssistant; print('✓ victor-devops imports')"
          python -c "from victor_dataanalysis import DataAnalysisAssistant; print('✓ victor-dataanalysis imports')"

      - name: Check vertical entry point loading
        run: |
          python - <<'PY'
          from victor.core.verticals import load_vertical

          verticals_to_test = ["coding", "rag", "research", "devops", "dataanalysis"]
          for vertical_name in verticals_to_test:
              try:
                  vertical = load_vertical(vertical_name)
                  print(f"✓ {vertical_name} loads via entry point: {vertical.__name__}")
              except Exception as e:
                  print(f"✗ {vertical_name} failed: {e}")
                  raise
          PY

      - name: Check protocol-based team spec loading
        run: |
          python - <<'PY'
          from victor.framework.providers.protocol import get_provider_registry
          from victor.framework.team_registry import load_all_verticals, get_team_registry

          # Test provider registry
          registry = get_provider_registry()
          all_specs = registry.get_all_team_specs()

          print("Protocol-based team spec discovery:")
          for vertical, specs in all_specs.items():
              print(f"  {vertical}: {len(specs)} teams")

          # Test loading into team registry
          count = load_all_verticals()
          print(f"Total teams registered: {count}")

          # Test cross-vertical team lookup
          team_reg = get_team_registry()
          feature_team = team_reg.find_team_for_task('feature')
          deploy_team = team_reg.find_team_for_task('deploy')

          assert feature_team is not None, "Feature team should be found"
          assert deploy_team is not None, "Deploy team should be found"

          print("✓ Protocol system working correctly")
          PY

      # - name: Startup KPI Guardrails
      #   TODO: Re-enable once external verticals are on PyPI
      #   The benchmark script requires activation-vertical which needs external packages
      #   env:
      #     GENERIC_RESULT_CACHE_ENABLED: "1"
      #     HTTP_CONNECTION_POOL_ENABLED: "1"
      #     FRAMEWORK_PRELOAD_ENABLED: "1"
      #   run: |
      #     python scripts/benchmark_startup_kpi.py \
      #       --iterations 3 \
      #       --provider ollama \
      #       --model qwen3-coder:30b \
      #       --max-import-cold-ms 5000 \
      #       --max-import-warm-mean-ms 25 \
      #       --max-agent-create-cold-ms 6000 \
      #       --max-agent-create-warm-mean-ms 1500

  strict-fallback-guards:
    name: Strict Fallback Guards
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Enforce strict fallback guards on focused suites
        run: |
          VICTOR_STRICT_FRAMEWORK_PROTOCOL_FALLBACKS=1 pytest \
            tests/unit/agent/test_capability_registry.py::TestVerticalIntegrationHelpers::test_check_capability_fallback_blocked_in_protocol_strict_mode \
            tests/unit/agent/test_capability_registry.py::TestVerticalIntegrationHelpers::test_invoke_capability_fallback_blocked_in_protocol_strict_mode \
            -q
          VICTOR_STRICT_FRAMEWORK_PRIVATE_FALLBACKS=1 pytest \
            tests/unit/framework/test_capability_config_helpers.py::TestCapabilityConfigHelpers::test_load_private_fallback_blocked_in_strict_mode \
            tests/unit/framework/test_capability_config_helpers.py::TestCapabilityConfigHelpers::test_store_private_fallback_blocked_in_strict_mode \
            tests/unit/framework/test_capability_loader.py::TestLoaderOrchestratorIntegration::test_apply_to_blocks_private_registration_fallback_in_strict_mode \
            -q

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check victor-ai / victor-sdk version consistency
        run: python scripts/check_version_sync.py

  guards:
    name: CI Guards
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check archive/victor-legacy guard
        if: github.event_name == 'pull_request'
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          ADDED_OR_MODIFIED=$(git diff --name-only --diff-filter=AM origin/${BASE_BRANCH}...HEAD | grep '^archive/victor-legacy/' || true)
          if [ -n "$ADDED_OR_MODIFIED" ]; then
            echo "❌ Additions/modifications under archive/victor-legacy/ are not allowed."
            echo "Found: $ADDED_OR_MODIFIED"
            exit 1
          fi
          echo "✓ Archive guard passed"

      - name: Check fallback_max_tools bound
        run: |
          val=$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path("victor/config/settings.py").read_text()
          m = re.search(r"fallback_max_tools:\s*int\s*=\s*(\d+)", text)
          print(m.group(1) if m else "")
          PY
          )
          if [ -z "$val" ]; then
            echo "❌ fallback_max_tools not found"
            exit 1
          fi
          if [ "$val" -le 0 ] || [ "$val" -gt 20 ]; then
            echo "❌ fallback_max_tools must be between 1 and 20 (found $val)"
            exit 1
          fi
          echo "✓ fallback_max_tools = $val (valid)"

  security-quick:
    name: Security Quick Scan
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
