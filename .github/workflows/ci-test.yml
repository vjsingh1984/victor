# Test Workflow with Sharding
# Tests run sequentially within each shard for reliable isolation
# Splits tests across 6 shards for parallel matrix execution

name: CI - Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests in parallel across Python versions and shards
  test:
    name: Test (Py${{ matrix.python-version }}, Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: []  # No dependencies - run in parallel with ci-fast
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pipenv
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Uninstall any existing victor packages to ensure clean state
          pip uninstall -y victor victor-ai victor-sdk || true
          # Use CPU-only torch for faster CI
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install the in-repo SDK FIRST so victor-ai can resolve victor-sdk>=X.Y
          # from the local editable install instead of requiring it on PyPI.
          pip install --no-cache-dir -e ./victor-sdk
          # Install the full development + CI dependency set explicitly. Avoid relying on
          # self-referential extras, which can leave async/test plugins unresolved in matrix jobs.
          # NOTE: Do NOT use --force-reinstall here — it overwrites the local editable
          # victor-sdk (0.7.0 with cli module) with the older PyPI release (0.6.0 without it).
          pip install --no-cache-dir -e ".[dev,ci,api]"
          # Re-install SDK editably to guarantee the local version wins even if
          # pip resolved victor-sdk from PyPI as a transitive dependency above.
          pip install --no-cache-dir --no-deps -e ./victor-sdk
          # Install pytest-split for sharding across CI jobs
          pip install pytest-split

      - name: Verify local victor import path and CI extras
        run: |
          python -c "import victor, victor_sdk.cli, lancedb, pytest_asyncio, scipy; print(victor.__file__)"

      - name: Run tests (sharded)
        run: |
          python -m pytest tests/unit \
            -m "not slow and not integration" \
            --splitting-algorithm=least_duration \
            --splits=6 \
            --group=${{ matrix.shard }} \
            -v \
            --tb=short \
            --cov=victor \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-context=test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11' && matrix.shard == 1
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-py311
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive coverage reports
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11' && matrix.shard == 1
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

  # Smoke test for CLI
  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-smoke-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-smoke-
            ${{ runner.os }}-pip-

      - name: Install Victor
        run: |
          pip install --upgrade pip
          # Uninstall any existing victor packages to ensure clean state
          pip uninstall -y victor victor-ai victor-sdk || true
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install the in-repo SDK first so victor-ai can resolve the dependency locally.
          pip install --no-cache-dir -e ./victor-sdk
          # Install victor-ai with embeddings extra (needed for CLI import chain).
          # Do NOT use --force-reinstall — it overwrites local editable SDK with PyPI version.
          pip install --no-cache-dir -e ".[embeddings]"
          # Re-install SDK editably to guarantee the local version wins
          pip install --no-cache-dir --no-deps -e ./victor-sdk

      - name: Test CLI commands
        run: |
          python -c "import victor, victor_sdk.cli; print(victor.__file__)"
          victor --version
          victor --help
          echo "✓ CLI smoke test passed"

  # Test summary job
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, smoke-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✅ All tests passed"
            exit 0
          else
            echo "❌ Some tests failed"
            echo "Test: ${{ needs.test.result }}"
            echo "Smoke test: ${{ needs.smoke-test.result }}"
            exit 1
          fi
# CI Fix
