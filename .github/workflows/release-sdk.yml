# Victor SDK Release Workflow
# Triggered independently from victor-ai releases
#
# Triggers:
#   - Push tag: sdk-v* (e.g., sdk-v0.7.0)
#   - Manual dispatch
#
# Outputs:
#   - PyPI package: victor-sdk

name: Release SDK

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: 'Publish to TestPyPI only'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK
        run: |
          pip install -e "./victor-sdk[dev]"

      - name: Run SDK tests
        run: |
          pytest victor-sdk/tests -v --tb=short

      - name: Type check
        if: matrix.python-version == '3.12'
        run: |
          cd victor-sdk && mypy victor_sdk --ignore-missing-imports

  version-check:
    name: Version Check
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check version consistency
        run: python scripts/check_version_sync.py

  build:
    name: Build SDK Package
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build
        working-directory: victor-sdk
        run: python -m build

      - name: Check package
        run: twine check victor-sdk/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-package
          path: victor-sdk/dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event.inputs.publish_testpypi == 'true' || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/victor-sdk/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-package
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          skip-existing: true
