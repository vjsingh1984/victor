name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Clone and install main victor framework from git FIRST
          git clone https://github.com/vjsingh1984/victor.git /tmp/victor-framework
          pip install -e /tmp/victor-framework
          # Now install victor-dataanalysis (victor-ai already satisfies dependency)
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Check coverage
        run: |
          pytest tests/ --cov=victor_dataanalysis --cov-report=term-missing
