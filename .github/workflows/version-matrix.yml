name: Version Matrix

on:
  workflow_dispatch:
    inputs:
      verticals:
        description: "Comma-separated vertical names to test (empty = all)"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-test:
    name: "${{ matrix.vertical }} (Py${{ matrix.python }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        vertical:
          - victor-coding
          - victor-devops
          - victor-research
          - victor-rag
          - victor-dataanalysis

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install core framework
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ./victor-sdk
          pip install -e ".[dev]"

      - name: Install vertical
        run: |
          pip install git+https://github.com/vjsingh1984/${{ matrix.vertical }}.git@main

      - name: Run vertical import test
        run: |
          VERTICAL_MODULE=$(echo "${{ matrix.vertical }}" | tr '-' '_')
          python -c "
          import ${VERTICAL_MODULE}
          print('Import OK: ${VERTICAL_MODULE}')

          # Check vertical has required attributes
          assistant_cls = getattr(${VERTICAL_MODULE}, '${VERTICAL_MODULE}'.replace('victor_', '').title() + 'Assistant', None)
          if assistant_cls:
              print(f'Assistant class: {assistant_cls.__name__}')
              if hasattr(assistant_cls, 'name'):
                  print(f'Vertical name: {assistant_cls.name}')
          "

      - name: Run SDK contract tests
        run: |
          python -m pytest tests/unit/sdk/test_sdk_contract_shapes.py -v --tb=short

      - name: Run vertical tests (if available)
        run: |
          VERTICAL_MODULE=$(echo "${{ matrix.vertical }}" | tr '-' '_')
          VERTICAL_TEST_DIR=$(python -c "import ${VERTICAL_MODULE}; import os; print(os.path.dirname(${VERTICAL_MODULE}.__file__))" 2>/dev/null || echo "")

          if [ -n "$VERTICAL_TEST_DIR" ]; then
            PACKAGE_ROOT=$(dirname "$VERTICAL_TEST_DIR")
            if [ -d "$PACKAGE_ROOT/tests" ]; then
              echo "Running vertical tests from $PACKAGE_ROOT/tests"
              python -m pytest "$PACKAGE_ROOT/tests" -v --tb=short || true
            else
              echo "No tests directory found for ${{ matrix.vertical }}"
            fi
          fi

  summary:
    name: Version Matrix Summary
    runs-on: ubuntu-latest
    needs: matrix-test
    if: always()

    steps:
      - name: Report
        run: |
          echo "## Version Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Vertical | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| victor-coding | ${{ needs.matrix-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| victor-devops | ${{ needs.matrix-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| victor-research | ${{ needs.matrix-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| victor-rag | ${{ needs.matrix-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| victor-dataanalysis | ${{ needs.matrix-test.result }} |" >> $GITHUB_STEP_SUMMARY
