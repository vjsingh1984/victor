# CI for the victor-codegraph package (editable install).
# Runs on PRs/pushes that touch the package. Tree-sitter grammars are installed via the
# [dev] extra so the JS/TS extraction tests actually exercise the grammar pack (not skip).

name: CI - codegraph

on:
  push:
    branches: [develop, main]
    paths:
      - 'victor-codegraph/**'
      - '.github/workflows/ci-codegraph.yml'
  pull_request:
    paths:
      - 'victor-codegraph/**'
      - '.github/workflows/ci-codegraph.yml'

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Editable install (local victor-contracts + package with dev/tree-sitter)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./victor-contracts
          pip install -e "./victor-codegraph[dev]"

      - name: Lint (ruff)
        working-directory: victor-codegraph
        run: ruff check victor_codegraph tests

      - name: Test
        working-directory: victor-codegraph
        run: pytest tests -v --tb=short
