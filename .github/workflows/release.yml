# Victor Release Workflow
# Automatically builds and publishes releases when a tag is pushed
#
# Triggers:
#   - Push tag: v* (e.g., v0.1.0, v1.0.0-beta)
#   - Manual dispatch for testing
#
# Outputs:
#   - PyPI package (and TestPyPI for pre-releases)
#   - Standalone binaries (macOS ARM64/x64, Linux x64/ARM64, Windows)
#   - Docker image (multi-arch)
#   - GitHub Release with checksums
#
# Installation:
#   pip install victor-ai
#   pipx install victor-ai
#   brew install vijayksingh/tap/victor

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: 'Publish to TestPyPI only'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ==========================================================================
  # Test before release
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: |
          pip install build twine

      - name: Build victor-sdk
        working-directory: victor-sdk
        run: |
          python -m build

      - name: Install victor-sdk from local wheel
        run: |
          pip uninstall -y victor-ai victor-sdk || true
          pip install victor-sdk/dist/*.whl
          python -c "from victor_sdk import __version__; print(f'victor-sdk {__version__} installed from local wheel')"

      - name: Install dependencies
        run: |
          pip install --force-reinstall --no-deps -e .
          pip install -e ".[dev]"
          pip uninstall -y victor || true
          python -c "from victor import Agent, __version__; print(f'✓ Agent import works (victor {__version__})')"

      - name: Run tests
        run: |
          pytest tests/unit -v --tb=short -n auto --dist loadscope \
            --ignore=tests/unit/core/verticals/test_definition_import_boundaries.py \
            --ignore=tests/unit/experiments/ab/ \
            --ignore=tests/unit/agent/test_conversation_embedding_store.py \
            --ignore=tests/unit/framework/test_team_node.py \
            --ignore=tests/unit/core/test_tool_dependency_loader_vertical_provider.py \
            --ignore=tests/unit/providers/test_openai_provider_ext.py \
            --ignore=tests/unit/providers/test_anthropic_provider_ext.py \
            --ignore=tests/unit/providers/test_lmstudio_provider.py \
            --ignore=tests/unit/providers/test_ollama_provider.py \
            --ignore=tests/unit/providers/test_xai_provider_ext.py \
            --ignore=tests/unit/scripts/test_repo_hygiene_check.py \
            --ignore=tests/unit/core/verticals/test_config_registry.py \
            --maxfail=50

      - name: Run linting
        run: |
          ruff check victor

  # ==========================================================================
  # Verify version sync
  # ==========================================================================
  version-check:
    name: Version Sync Check
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check version consistency
        run: python scripts/check_version_sync.py

  # ==========================================================================
  # Build Python packages (SDK + AI)
  # ==========================================================================
  build-python:
    name: Build Python Packages
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          pip install build twine

      - name: Build victor-sdk
        working-directory: victor-sdk
        run: |
          python -m build

      - name: Check victor-sdk package
        run: |
          twine check victor-sdk/dist/*

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-package
          path: victor-sdk/dist/

      - name: Build victor-ai
        run: |
          python -m build

      - name: Check victor-ai package
        run: |
          twine check dist/*

      - name: Upload victor-ai artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # ==========================================================================
  # Build native extensions (Rust via maturin)
  # ==========================================================================
  build-native:
    name: Build Native (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux ARM64 - skipped (cross-compile needs zig/special setup)
          # Users on ARM64 Linux can use pure Python wheel
          # macOS ARM64 (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
          # macOS x64 (Intel) - using macos-15-intel since macos-13 is retired
          - os: macos-15-intel
            target: x86_64-apple-darwin
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Update rustup to stable
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: native-wheels-${{ matrix.target }}
          path: rust/dist/*.whl

  # ==========================================================================
  # Build standalone binaries
  # ==========================================================================
  build-binary:
    name: Build Binary (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries skipped - PyInstaller + PyTorch/sentence-transformers too complex
          # Linux users should use: pip install victor-ai
          # macOS ARM64 (M1/M2/M3)
          - os: macos-latest
            platform: macos
            arch: arm64
          # macOS x64 (Intel) - using macos-15-intel since macos-13 is retired
          - os: macos-15-intel
            platform: macos
            arch: x64
          # Windows x64
          - os: windows-latest
            platform: windows
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[build]"

      - name: Build binary
        run: |
          python scripts/build_binary.py --onefile --output victor

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czvf victor-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz victor*
          mv victor-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ../

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path victor* -DestinationPath ../victor-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: victor-${{ matrix.platform }}-${{ matrix.arch }}.*

  # ==========================================================================
  # Build Docker image (build only, push later after all checks pass)
  # ==========================================================================
  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          # Remove large unused packages to free up ~25GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          # Clean apt cache
          sudo apt-get clean
          # Clean Docker cache
          docker system prune -af --volumes || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}
            vjsingh1984/victor-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/victor-docker.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/victor-docker.tar
          retention-days: 1

  # ==========================================================================
  # Security scan Docker image with Trivy
  # ==========================================================================
  security-scan:
    name: Security Scan (Trivy)
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for uploading to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Load Docker image
        run: docker load -i /tmp/victor-docker.tar

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on critical/high vulnerabilities
          # Ensure latest vulnerability database
          trivy-config: |
            timeout:
              10m
            skip-dirs:
              - /usr/local/lib/python*
            db:
              repository: 'ghcr.io/aquasecurity/trivy:latest'
          # Use latest Trivy version and ignore outdated cache
          cache: false

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even if scan fails
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output for logs)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          # Ensure latest vulnerability database
          trivy-config: |
            timeout:
              10m
            skip-dirs:
              - /usr/local/lib/python*
            db:
              repository: 'ghcr.io/aquasecurity/trivy:latest'
          # Use latest Trivy version and ignore outdated cache
          cache: false

  # ==========================================================================
  # Build and test VS Code extension
  # ==========================================================================
  build-vscode:
    name: Build VS Code Extension
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-victor
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-victor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true  # Don't fail on lint warnings

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test || true  # Tests may need VS Code runtime
        env:
          CI: true

      - name: Package extension (VSIX)
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-victor/*.vsix

  # ==========================================================================
  # NOTE: All publishing jobs run AFTER all builds and release creation
  # This ensures we don't publish to PyPI/Docker Hub if any build fails
  # ==========================================================================

  # ==========================================================================
  # Publish to TestPyPI (for pre-releases or manual testing) - runs first
  # ==========================================================================
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-python, build-native, build-binary, build-docker, generate-checksums, create-release]
    if: github.event.inputs.publish_testpypi == 'true' || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/victor-ai/
    permissions:
      id-token: write

    steps:
      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-package
          path: sdk-dist/

      - name: Publish victor-sdk to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: sdk-dist/
          skip-existing: true

      - name: Download victor-ai artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish victor-ai to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # ==========================================================================
  # Publish to PyPI (Trusted Publishing - no API token needed)
  # IMPORTANT: SDK must be published BEFORE victor-ai (dependency order)
  # ==========================================================================
  publish-sdk-pypi:
    name: Publish victor-sdk to PyPI
    needs: [build-python, build-native, build-binary, build-docker, generate-checksums, create-release]
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-package
          path: dist/

      - name: Publish victor-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          skip-existing: true

  publish-pypi:
    name: Publish victor-ai to PyPI
    needs: [publish-sdk-pypi]
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish victor-ai to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  # ==========================================================================
  # Publish Docker image to Docker Hub
  # IMPORTANT: This runs LAST after all builds pass and release is created
  # ==========================================================================
  publish-docker:
    name: Publish Docker Image
    needs: [build-python, build-native, build-binary, build-docker, generate-checksums, create-release]
    runs-on: ubuntu-latest

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Load Docker image
        run: docker load -i /tmp/victor-docker.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Push Docker image
        run: |
          docker push vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}
          docker push vjsingh1984/victor-ai:latest

  # ==========================================================================
  # Generate checksums for all artifacts
  # ==========================================================================
  generate-sbom:
    name: Generate SBOM
    needs: [build-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          pip install -e ".[embeddings]"
          cyclonedx-py environment -o sbom.json --output-format json
          cyclonedx-py environment -o sbom.xml --output-format xml

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml

  generate-checksums:
    name: Generate Checksums
    needs: [build-python, build-native, build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.whl" -o -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > ../checksums.txt
          cat ../checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

  # ==========================================================================
  # Create GitHub Release (before PyPI/Docker publishing)
  # ==========================================================================
  create-release:
    name: Create GitHub Release
    needs: [build-python, build-native, build-binary, build-docker, generate-checksums, generate-sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          cat > CHANGELOG.md << 'RELEASE_NOTES'
          ## What's Changed

          RELEASE_NOTES
          # Get commits since last tag
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md
          cat >> CHANGELOG.md << RELEASE_NOTES

          ## Installation

          ### Using pip (recommended)
          \`\`\`bash
          pip install victor-ai==${{ steps.version.outputs.VERSION }}
          \`\`\`

          ### Using pipx (isolated environment)
          \`\`\`bash
          pipx install victor-ai==${{ steps.version.outputs.VERSION }}
          \`\`\`

          ### Using Homebrew (macOS/Linux)
          \`\`\`bash
          brew install vijayksingh/tap/victor
          \`\`\`

          ### Using Docker
          \`\`\`bash
          docker pull vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}
          docker run -it --rm vjsingh1984/victor-ai:${{ steps.version.outputs.VERSION }}
          \`\`\`

          ## Platform Binaries

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | macOS | ARM64 (M1/M2/M3) | \`victor-macos-arm64.tar.gz\` |
          | macOS | x64 (Intel) | \`victor-macos-x64.tar.gz\` |
          | Windows | x64 | \`victor-windows-x64.zip\` |
          | Linux | Any | Use \`pip install victor-ai\` |

          ## Verification

          Verify downloads using checksums in \`checksums.txt\`:
          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`
          RELEASE_NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Victor v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/python-package/*
            artifacts/sdk-package/*
            artifacts/binary-*/*
            artifacts/checksums/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Homebrew formula auto-updates via polling in vjsingh1984/homebrew-tap
  # No action needed here - the tap checks for new releases every 6 hours
  # ==========================================================================
