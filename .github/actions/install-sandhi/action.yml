name: Install sandhi-gateway from source
description: Build + install sandhi-gateway (0.1.2) from anvai-labs/sandhi@develop. Used until 0.1.2 is published to PyPI (release held to end); Victor pins sandhi-gateway==0.1.2.
runs:
  using: composite
  steps:
    - name: Ensure Rust toolchain (maturin build needs cargo)
      uses: dtolnay/rust-toolchain@stable
    - name: Build + install sandhi-gateway from source
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "sandhi-gateway @ git+https://github.com/anvai-labs/sandhi@develop#subdirectory=bindings/python"
