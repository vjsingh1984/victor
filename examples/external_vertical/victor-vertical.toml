# victor-vertical.toml - Metadata for Victor Security Vertical

[vertical]
name = "security"
description = "Security auditing, vulnerability analysis, and compliance review"
version = "0.2.0"
category = "security"
tags = ["security", "audit", "compliance", "vulnerability"]
requires_victor = ">=0.6.0"
license = "Apache-2.0"
authors = [{name = "Victor Community", email = "community@victor.dev"}]
homepage = "https://github.com/vjsingh1984/victor"
repository = "https://github.com/vjsingh1984/victor"

[vertical.class]
module = "victor_security.assistant"
class_name = "SecurityAssistant"
provides_tools = ["read", "ls", "code_search", "shell", "web_search", "write"]
provides_workflows = ["vulnerability_scan", "dependency_audit", "incident_review"]
provides_capabilities = ["file_ops", "git", "web_access"]

[vertical.dependencies]
python = ["victor-sdk>=0.6.0"]
verticals = []

[vertical.compatibility]
python_version = ">=3.10"
