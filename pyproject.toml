[project.entry-points."victor.plugins"]
# Built-in verticals (canonical registration)
benchmark = "victor.benchmark:plugin"

# =============================================================================
# External Vertical Registration (for third-party packages)
# =============================================================================
# Third-party packages can register custom verticals with Victor by defining
# an entry point in the "victor.plugins" group.
#
# Example in external package's pyproject.toml:
#
#   [project.entry-points."victor.plugins"]
#   security = "victor_security:plugin"
#   ml_ops = "victor_mlops.plugin:plugin"
#
# Requirements for external verticals:
#   1. Publish a VictorPlugin implementation under "victor.plugins"
#   2. The plugin should register SDK-authored vertical definitions via PluginContext
#   3. Vertical definitions should inherit from victor_sdk.VerticalBase
#   4. Runtime-only extensions/providers should be published through explicit extension groups
#
# Example plugin + vertical implementation:
#
#   from victor_sdk import VictorPlugin, PluginContext, VerticalBase, ToolNames
#
#   class SecurityAssistant(VerticalBase):
#       name = "security"
#       description = "Security vulnerability analysis assistant"
#
#       @classmethod
#       def get_name(cls):
#           return cls.name
#
#       @classmethod
#       def get_description(cls):
#           return cls.description
#
#       @classmethod
#       def get_tools(cls):
#           return [ToolNames.READ, ToolNames.GREP, "security_scan", "dependency_audit"]
#
#       @classmethod
#       def get_system_prompt(cls):
#           return "You are a security expert..."
#
#   class SecurityPlugin(VictorPlugin):
#       @property
#       def name(self):
#           return "security"
#
#       def register(self, context: PluginContext) -> None:
#           context.register_vertical(SecurityAssistant)
#
#   plugin = SecurityPlugin()
#
# Victor discovers plugins lazily via "victor.plugins" and resolves their
# registered verticals at runtime.
# =============================================================================

# =============================================================================
# Skill Registration (for verticals and third-party packages)
# =============================================================================
# Skills are composable units of expertise that bind prompts + tools.
# Verticals and external packages can register skills via entry points:
#
#   [project.entry-points."victor.skills"]
#   debug = "my_package.skills:debug_skill"
#   refactor = "my_package.skills:refactor_skill"
#
# Each entry point should resolve to a SkillDefinition instance or a
# callable returning one or a list of SkillDefinition objects.
# =============================================================================
[project.entry-points."victor.skills"]
# Built-in skills will be registered here as they are created

[tool.setuptools.packages.find]
include = ["victor", "victor.*"]
exclude = ["tests*", "docs*", "victor_test*"]

# Ensure verticals.contrib packages are included
namespaces = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
# Ensure workflow/config assets are available in wheel installs.
victor = [
    "config/*.yaml",
    "config/*.yml",
    "config/*.json",
    "verticals/contrib/*/*.yaml",
    "verticals/contrib/*/*.toml",
    "verticals/contrib/*/*.svg",
    "verticals/contrib/*/workflows/*.yaml",
    "verticals/contrib/*/workflows/*.svg",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=victor",
    "--cov-report=",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: marks tests as integration tests (require external services)",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "unit: marks tests as unit tests",
    "workflows: marks workflow-related tests",
    "agents: marks multi-agent tests",
    "hitl: marks human-in-the-loop tests",
]
filterwarnings = [
    # Ignore PytestCollectionWarning for non-test classes in victor module
    # These are data classes/enums that happen to start with "Test" (e.g., TestResult, TestRunner)
    "ignore:cannot collect test class.*because it has a __init__ constructor:pytest.PytestCollectionWarning",
    # Ignore semaphore leak warnings from multiprocessing (common in test cleanup)
    # These come from dependencies like ChromaDB, sentence_transformers
    "ignore:.*semaphore.*:ResourceWarning",
    "ignore:.*leaked.*semaphore.*:UserWarning",
    # Ignore multiprocessing resource tracker warnings
    "ignore:.*resource_tracker.*:UserWarning",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "archive",
    "examples",
    "docker/demos",
    "victor_test",
    "demo_workspace",
    "src",
    "ui",
    "web/ui",
    "htmlcov",
    "venv",
    "game_app.py",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "E402",  # module level import not at top of file (sometimes necessary)
    "F401",  # unused imports (often intentional re-exports)
    "F811",  # redefined while unused (type imports shadowing runtime)
    "B007",  # loop control variable not used within loop body
    "B008",  # do not perform function calls in argument defaults
    "B019",  # lru_cache on methods (valid pattern for class methods)
    "B023",  # function uses loop variable (common pattern)
    "B024",  # abstract class with no abstract methods (valid for protocols)
    "B025",  # try-except with empty except clause (handled elsewhere)
    "B904",  # allow broad HTTPException raising for now
    "B905",  # zip() without strict= parameter (not critical)
    "C401",  # unnecessary generator (minor optimization)
    "C414",  # unnecessary list/set call (minor optimization)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__.py
"tests/**/*.py" = [
    "B017",  # assert blind exception (common in test assertions)
    "B018",  # useless expression (for test assertions)
    "E741",  # ambiguous variable name (common in test fixtures)
    "F841",  # unused local variable (often for side-effect testing)
]

[tool.mypy]
python_version = "3.10"
# Type checking configuration - M3: Global strict mode enabled (2026-03-10)
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
exclude = [
    "^archive/",
    "^vscode-victor/",
    "^tests/",
    "^scripts/",
]
files = ["victor"]

