# MkDocs Configuration for Victor Documentation
site_name: Victor
site_description: Contract-first agentic AI framework supporting 24 LLM providers with 34 tool modules across 9 verticals (5 domain + 4 utility)
site_author: Vijaykumar Singh
site_url: https://vjsingh1984.github.io/victor/
repo_url: https://github.com/vjsingh1984/victor
copyright: Copyright &copy; 2025 Vijaykumar Singh

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/images/victor-logo-icon.svg
  favicon: assets/images/victor-logo-icon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search
  - git-revision-date-localized
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          # Static analysis only (griffe parses source) — the docs build never imports victor, so
          # CI needs no heavy runtime deps (torch etc.) and there are no import side effects.
          allow_inspection: false
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: false
            merge_init_into_class: true
            members_order: source
            filters: ["!^_"]

# Single-source the docs version stamp ({{ victor_version }}) from the repo-root VERSION file.
# A targeted hook, not mkdocs-macros: the docs contain literal {{ ... }} examples (cookiecutter
# trees, Cypher, workflow prompts) that a full Jinja pass would mangle.
hooks:
  - mkdocs_hooks/version_stamp.py

markdown_extensions:
  - markdown.extensions.admonition
  - markdown.extensions.attr_list
  - markdown.extensions.codehilite:
      guess_lang: false
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - markdown.extensions.meta
  - markdown.extensions.nl2br
  - markdown.extensions.sane_lists
  - markdown.extensions.tables
  - markdown.extensions.toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: vjsingh1984
      repo: victor
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vjsingh1984/victor
      name: Victor on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/victor-ai/
      name: Victor on PyPI
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Blueprint: architecture/BLUEPRINT.md
  - Architecture: architecture.md
  - Features: features.md
  - Tech Stack: tech-stack.md
  - Roadmap: roadmap.md
  - Architecture Deep-Dives:
      - architecture/orchestrator_decomposition.md
      - SDK Boundary: architecture/CONTRACTS_BOUNDARY.md
      - State-Passed Coordinators: architecture/state-passed-architecture.md
      - Streaming Pipeline: architecture/streaming-pipeline.md
      - Smart Routing: architecture/smart_routing.md
      - Edge Provider Strategy: architecture/edge-provider-tool-strategy.md
      - Unified Prompt Architecture: architecture/unified_prompt_architecture.md
      - ADRs: architecture/adr/README.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - First Run: getting-started/first-run.md
      - Basic Usage: getting-started/basic-usage.md
      - Web Chat UI: getting-started/web-chat-ui.md
  - User Guide:
      - user-guide/index.md
      - CLI Reference: user-guide/cli-reference.md
      - Providers: user-guide/providers.md
      - Tools: user-guide/tools.md
      - Workflows: user-guide/workflows.md
      - Session Management: user-guide/session-management.md
      - Troubleshooting: user-guide/troubleshooting.md
  - API Reference:
      - Auto-generated (from docstrings): api-reference/auto-api.md
      - Protocols: api-reference/protocols.md
      - Providers: api-reference/providers.md
      - Tools: api-reference/tools.md
      - Workflows: api-reference/workflows.md
  - Tutorials:
      - tutorials/build-custom-tool.md
      - Create Workflow: tutorials/create-workflow.md
      - Integrate Provider: tutorials/integrate-provider.md
  - Verticals:
      - Coding: verticals/coding.md
      - DevOps: verticals/devops.md
      - RAG: verticals/rag.md
      - Data Analysis: verticals/data-analysis.md
      - Research: verticals/research.md
  - Reference:
      - reference/index.md
      - CLI Commands: reference/cli-commands.md
      - Configuration Options: reference/configuration-options.md
      - Environment Variables: reference/environment-variables.md
  - Development:
      - development/index.md
      - Setup: development/setup.md
      - Code Style: development/code-style.md
      - Exception Handling: development/exception-handling.md
      - Testing: development/testing.md
      - PR Workflow: development/PR_WORKFLOW.md
